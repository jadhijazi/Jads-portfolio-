<section id="Contact">
    <h2>Contact Me</h2>

    <form action="#" method="post">

        <fieldset>
            <legend>Contact Information</legend>

            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname"
                   required maxlength="60" placeholder="Enter your full name"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"
                   required placeholder="example@mail.com"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"
                   placeholder="e.g., +6012-3456789"><br><br>

            <label for="age">Age:</label><br>
            <input type="number" id="age" name="age"
                   min="10" max="100"><br><br>

            <label for="date">Preferred Contact Date:</label><br>
            <input type="date" id="date" name="date"
                   required><br><br>

        </fieldset>

        <br>

        <fieldset>
            <legend>Message Details</legend>

            <label for="subject">Subject:</label><br>
            <select id="subject" name="subject">
                <optgroup label="General">
                    <option value="question">General Question</option>
                    <option value="collaboration">Collaboration</option>
                </optgroup>

                <optgroup label="Technical">
                    <option value="bug">Report a Bug</option>
                    <option value="feedback">Provide Feedback</option>
                </optgroup>
            </select><br><br>

            <p><strong>Preferred Contact Method (Choose any):</strong></p>

            <label for="c-email"><input type="checkbox" id="c-email" name="contact_method" value="email"> Email</label><br>
            <label for="c-phone"><input type="checkbox" id="c-phone" name="contact_method" value="phone"> Phone</label><br>
            <label for="c-whatsapp"><input type="checkbox" id="c-whatsapp" name="contact_method" value="whatsapp"> WhatsApp</label><br><br>

            <p><strong>Priority:</strong></p>

            <label for="p-low"><input type="radio" id="p-low" name="priority" value="low" required> Low</label><br>
            <label for="p-med"><input type="radio" id="p-med" name="priority" value="medium"> Medium</label><br>
            <label for="p-high"><input type="radio" id="p-high" name="priority" value="high"> High</label><br><br>

            <label for="urgency">Urgency Level:</label><br>
            <input type="range" id="urgency" name="urgency" min="1" max="10"><br><br>

            <label for="message">Your Message:</label><br>
            <textarea id="message" name="message"
                      required placeholder="Write your message here..."
                      maxlength="500"></textarea><br><br>

        </fieldset>

        <br>

        <button type="submit">Send Message</button>

    </form>
</section>
