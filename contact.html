<section id="Contact">
    <h2>Contact Me</h2>

    <form action="#" method="post" style="border: 2px solid black; padding: 15px; background-color: #f7f7f7;">

        <fieldset style="padding: 10px; border: 2px solid gray;">
            <legend style="font-size: 18px; font-weight: bold; color: navy;">
                Contact Information
            </legend>

            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname"
                   required maxlength="60" placeholder="Enter your full name"
                   style="padding: 6px; border: 2px solid navy; font-size: 14px; width: 250px;"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email"
                   required placeholder="example@mail.com"
                   style="padding: 6px; border: 2px solid navy; width: 250px;"><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"
                   placeholder="e.g., +6012-3456789"
                   style="padding: 6px; border: 1px solid #555; width: 250px;"><br><br>

            <label for="age">Age:</label><br>
            <input type="number" id="age" name="age"
                   min="10" max="100"
                   style="padding: 6px; border: 1px solid #555;"><br><br>

            <label for="date">Preferred Contact Date:</label><br>
            <input type="date" id="date" name="date"
                   required style="padding: 6px; border: 1px solid #555;"><br><br>

        </fieldset>

        <br>

        <fieldset style="padding: 10px; border: 2px solid gray;">
            <legend style="font-size: 18px; font-weight: bold; color: navy;">
                Message Details
            </legend>

            <label for="subject">Subject:</label><br>
            <select id="subject" name="subject"
                    style="padding: 6px; border: 2px solid black; background-color: #e6e6ff;">

                <optgroup label="General">
                    <option value="question">General Question</option>
                    <option value="collaboration">Collaboration</option>
                </optgroup>

                <optgroup label="Technical">
                    <option value="bug">Report a Bug</option>
                    <option value="feedback">Provide Feedback</option>
                </optgroup>

            </select><br><br>

            <p style="font-size: 16px;"><strong>Preferred Contact Method (Choose any):</strong></p>

            <label for="c-email"><input type="checkbox" id="c-email" name="contact_method" value="email"> Email</label><br>
            <label for="c-phone"><input type="checkbox" id="c-phone" name="contact_method" value="phone"> Phone</label><br>
            <label for="c-whatsapp"><input type="checkbox" id="c-whatsapp" name="contact_method" value="whatsapp"> WhatsApp</label><br><br>

            <p style="font-size: 16px;"><strong>Priority:</strong></p>

            <label for="p-low"><input type="radio" id="p-low" name="priority" value="low" required> Low</label><br>
            <label for="p-med"><input type="radio" id="p-med" name="priority" value="medium"> Medium</label><br>
            <label for="p-high"><input type="radio" id="p-high" name="priority" value="high"> High</label><br><br>

            <label for="urgency">Urgency Level:</label><br>
            <input type="range" id="urgency" name="urgency" min="1" max="10"
                   style="width: 200px;"><br><br>

            <label for="message">Your Message:</label><br>
            <textarea id="message" name="message"
                      required placeholder="Write your message here..."
                      maxlength="500"
                      style="width: 300px; height: 120px; padding: 8px; border: 2px solid black;"></textarea><br><br>

        </fieldset>

        <br>

        <button type="submit"
                style="padding: 10px 20px; background-color: navy; color: white; border: none; font-size:16px;">
            Send Message
        </button>

    </form>
</section>
